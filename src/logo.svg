<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">

    <!-- Background -->
    <circle cx="300" cy="300" r="280" fill="#1E63D6"/>

    <!-- Text -->
    <text
            x="300"
            y="190"
            text-anchor="middle"
            font-size="64"
            font-family="Arial, Helvetica, sans-serif"
            font-weight="bold"
            fill="#2ECC71"
            letter-spacing="2">
        Køreskole
    </text>

    <!-- Car -->
    <g transform="translate(180,270)">

        <!-- Shadow -->
        <ellipse cx="120" cy="155" rx="120" ry="20" fill="#174EA6" opacity="0.4"/>

        <!-- Main body -->
        <rect x="0" y="50" width="240" height="70" rx="25" fill="#2ECC71"/>

        <!-- Cabin -->
        <path d="M50 50 L90 10 L170 10 L210 50 Z" fill="#27AE60"/>

        <!-- Windows -->
        <rect x="85" y="20" width="70" height="30" rx="6" fill="#BFE9FF"/>

        <!-- Wheels -->
        <circle cx="60" cy="135" r="28" fill="#2C3E50"/>
        <circle cx="180" cy="135" r="28" fill="#2C3E50"/>

        <circle cx="60" cy="135" r="14" fill="#BDC3C7"/>
        <circle cx="180" cy="135" r="14" fill="#BDC3C7"/>

        <!-- Driving school L sign -->
        <rect x="95" y="-25" width="50" height="35" rx="6" fill="white" stroke="#2C3E50" stroke-width="3"/>
        <text x="120" y="0" text-anchor="middle" font-size="22" font-family="Arial" font-weight="bold" fill="#2C3E50">L</text>

    </g>

</svg>